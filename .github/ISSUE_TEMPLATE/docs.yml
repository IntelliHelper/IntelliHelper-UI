name: Docs improvement
description: Report unclear docs, missing examples, or playground issues.
title: "docs: "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Where
      description: URL or file path (e.g. /getting-started, README, packages/cli/README.md).
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
    validations:
      required: false
